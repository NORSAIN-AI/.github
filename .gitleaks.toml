# NORSAIN-AI gitleaks configuration
#
# Why: Centralize secret-detection rules and allowlists for all NORSAIN-AI
# repos so that reusable security-secrets.yml has a predictable baseline.
# What: Extends the gitleaks default ruleset and adds targeted rules for
# cloud and AI vendor keys NORSAIN actually uses, plus a test-fixture
# allowlist so CI does not block intentionally-fake credentials in tests.
# Test: Commit `AKIAIOSFODNN7EXAMPLE` in a non-test path and confirm gitleaks
# flags it. Place the same string under `**/fixtures/**` and confirm it is
# allowlisted.

title = "NORSAIN-AI gitleaks baseline"

[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Rules — vendor keys NORSAIN uses (AWS, GCP, GitHub, Slack, OpenAI, Anthropic)
# ---------------------------------------------------------------------------

[[rules]]
id = "aws-access-key-id"
description = "AWS Access Key ID"
regex = '''(?i)\b((?:AKIA|ASIA|AIDA|AGPA|AROA|AIPA|ANPA|ANVA)[0-9A-Z]{16})\b'''
tags = ["key", "aws"]

[[rules]]
id = "aws-secret-access-key"
description = "AWS Secret Access Key (heuristic)"
regex = '''(?i)aws(.{0,20})?(secret|key)(.{0,20})?['"]?[=:]\s*['"]?([A-Za-z0-9/+=]{40})['"]?'''
secretGroup = 4
tags = ["secret", "aws"]

[[rules]]
id = "gcp-service-account-key"
description = "GCP service account private key (JSON)"
regex = '''"type":\s*"service_account"'''
tags = ["key", "gcp"]

[[rules]]
id = "gcp-api-key"
description = "GCP API key"
regex = '''\bAIza[0-9A-Za-z\-_]{35}\b'''
tags = ["key", "gcp"]

[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''\bghp_[0-9A-Za-z]{36}\b'''
tags = ["key", "github"]

[[rules]]
id = "github-oauth"
description = "GitHub OAuth token"
regex = '''\bgho_[0-9A-Za-z]{36}\b'''
tags = ["key", "github"]

[[rules]]
id = "github-app-token"
description = "GitHub App installation token"
regex = '''\b(ghu|ghs)_[0-9A-Za-z]{36}\b'''
tags = ["key", "github"]

[[rules]]
id = "github-fine-grained-pat"
description = "GitHub fine-grained PAT"
regex = '''\bgithub_pat_[0-9A-Za-z_]{80,}\b'''
tags = ["key", "github"]

[[rules]]
id = "slack-bot-token"
description = "Slack bot/user/app token"
regex = '''\bxox[abpsr]-[0-9A-Za-z-]{10,}\b'''
tags = ["key", "slack"]

[[rules]]
id = "slack-webhook"
description = "Slack incoming webhook"
regex = '''https://hooks\.slack\.com/services/T[0-9A-Z]{8,}/B[0-9A-Z]{8,}/[0-9A-Za-z]{20,}'''
tags = ["webhook", "slack"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''\bsk-(?:proj-)?[A-Za-z0-9_\-]{20,}\b'''
tags = ["key", "openai"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''\bsk-ant-(?:api|admin)[0-9]{2}-[A-Za-z0-9_\-]{80,}\b'''
tags = ["key", "anthropic"]

# ---------------------------------------------------------------------------
# Allowlist — test fixtures, documentation examples, lockfiles
# ---------------------------------------------------------------------------

[allowlist]
description = "Global allowlist for NORSAIN-AI repos"
paths = [
  '''(?i)(^|/)(test|tests|__tests__|__mocks__|fixtures|testdata|mocks|examples|docs)(/|$)''',
  '''(^|/)(pnpm-lock\.yaml|package-lock\.json|yarn\.lock|uv\.lock|poetry\.lock|Cargo\.lock|go\.sum)$''',
  '''(^|/)\.env\.example$''',
  '''(^|/)\.gitleaks\.toml$''',
]

regexes = [
  # Canonical AWS docs example key
  '''AKIAIOSFODNN7EXAMPLE''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
  # Placeholder/obvious-dummy tokens
  '''(?i)(example|sample|dummy|placeholder|your[-_]?(?:token|key|secret))''',
]

stopwords = [
  "example",
  "sample",
  "dummy",
  "placeholder",
]
