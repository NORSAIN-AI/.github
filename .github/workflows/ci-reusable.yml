name: Reusable CI Workflow

on:
  workflow_call:
    inputs:
      language:
        description: 'Primary language (node, python, go, java, ruby, etc.)'
        required: true
        type: string
      node-version:
        description: 'Node.js version (if language is node)'
        required: false
        type: string
        default: '20'
      python-version:
        description: 'Python version (if language is python)'
        required: false
        type: string
        default: '3.11'
      go-version:
        description: 'Go version (if language is go)'
        required: false
        type: string
        default: '1.21'
      java-version:
        description: 'Java version (if language is java)'
        required: false
        type: string
        default: '17'
      build-command:
        description: 'Command to build the project'
        required: false
        type: string
        default: ''
      test-command:
        description: 'Command to run tests'
        required: false
        type: string
        default: ''
      lint-command:
        description: 'Command to run linter'
        required: false
        type: string
        default: ''
      working-directory:
        description: 'Working directory for commands'
        required: false
        type: string
        default: '.'
      cache-dependency-path:
        description: 'Path to dependency file for caching'
        required: false
        type: string
        default: ''
      runs-on:
        description: 'Runner to use'
        required: false
        type: string
        default: 'ubuntu-latest'

jobs:
  ci:
    name: CI
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node.js setup
      - name: Setup Node.js
        if: inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache-dependency-path || format('{0}/package-lock.json', inputs.working-directory) }}

      - name: Install Node.js dependencies
        if: inputs.language == 'node'
        run: npm ci

      # Python setup
      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
          cache-dependency-path: ${{ inputs.cache-dependency-path || format('{0}/requirements.txt', inputs.working-directory) }}

      - name: Install Python dependencies
        if: inputs.language == 'python'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      # Go setup
      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path || format('{0}/go.sum', inputs.working-directory) }}

      - name: Install Go dependencies
        if: inputs.language == 'go'
        run: go mod download

      # Java setup
      - name: Setup Java
        if: inputs.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      # Lint step
      - name: Run linter
        if: inputs.lint-command != ''
        run: ${{ inputs.lint-command }}

      # Build step
      - name: Build
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      # Test step
      - name: Run tests
        if: inputs.test-command != ''
        run: ${{ inputs.test-command }}

      # Upload test results (optional)
      - name: Upload test results
        if: always() && inputs.test-command != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/test-results/**
            **/coverage/**
            **/.coverage
          retention-days: 30
          if-no-files-found: ignore
