name: Enforce Milestone

on:
  pull_request:
    types: [opened, edited, milestoned, demilestoned]
  issues:
    types: [opened, edited, milestoned, demilestoned]

permissions:
  issues: write
  pull-requests: write

jobs:
  enforce-milestone:
    name: Check Milestone Assignment
    runs-on: ubuntu-latest
    steps:
      - name: Verify milestone
        uses: actions/github-script@v7
        with:
          script: |
            const item = context.payload.pull_request || context.payload.issue;
            const itemType = context.payload.pull_request ? 'PR' : 'issue';
            const itemNumber = item.number;
            
            // Check for exemption label
            const labels = (item.labels || []).map(l => l.name);
            if (labels.includes('no-milestone')) {
              console.log(`Skipping milestone enforcement for ${itemType} #${itemNumber} due to no-milestone label`);
              return;
            }
            
            if (!item.milestone) {
              const message = `⚠️ This ${itemType} must have a milestone assigned before it can be merged/closed. Please assign an appropriate milestone.`;
              
              // Add a comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: itemNumber,
                body: message
              });
              
              // Set a label to indicate missing milestone
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: itemNumber,
                labels: ['needs-milestone']
              });
              
              // NOTE: Advisory only - do not fail the workflow
              console.log(`⚠️ ${itemType} #${itemNumber} is missing a milestone (advisory only)`);
            } else {
              // Remove the needs-milestone label if present
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: itemNumber,
                  name: 'needs-milestone'
                });
              } catch (error) {
                // Label might not exist, ignore
              }
              
              console.log(`✅ Milestone "${item.milestone.title}" is assigned`);
            }
