name: Reusable Security — Secrets Scanning

# Why: Prevent committed credentials from leaking into NORSAIN-AI repos and
# catch verified leaks already in history via a weekly deep sweep.
# What: Runs gitleaks on every call (PR/push) with PR comment + fail-on-find,
# and runs TruffleHog with --only-verified weekly (Monday 06:00 UTC) or on
# manual dispatch; opens a tracked GitHub issue on verified findings.
# Test: Add a fake AWS key (e.g. AKIAIOSFODNN7EXAMPLE) in a PR and verify
# gitleaks blocks it. Run the trufflehog job via workflow_dispatch against a
# repo with a verified secret and confirm an issue is created.

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    # Weekly TruffleHog deep sweep — Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gitleaks:
    name: Gitleaks (every call)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_CONFIG: .gitleaks.toml

  trufflehog:
    name: TruffleHog (scheduled deep sweep)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (verified only)
        id: trufflehog
        continue-on-error: true
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --json

      - name: Capture TruffleHog findings
        if: steps.trufflehog.outcome == 'failure'
        shell: bash
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p .trufflehog
          cat > .trufflehog/issue-body.md <<EOF
          TruffleHog detected verified secrets during the scheduled weekly
          deep sweep.

          - Run: ${RUN_URL}
          - Scan type: verified credentials only
          - Triage: rotate affected credentials immediately, then purge via
            git filter-repo or BFG, force-push history, and confirm the next
            scheduled run is clean.

          Refer to docs/security/triage-runbook.md once available.
          EOF

      - name: Open issue on verified findings
        if: steps.trufflehog.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "security: TruffleHog verified secret finding"
          content-filepath: .trufflehog/issue-body.md
          labels: |
            security
            secrets
            priority-high

      - name: Fail job if verified findings were detected
        if: steps.trufflehog.outcome == 'failure'
        shell: bash
        run: |
          echo "Verified secrets detected by TruffleHog. See opened issue." >&2
          exit 1
